<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Notification Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Shared top navigation -->
    <header class="top-bar">
      <a href="/" class="top-bar__brand" data-path="/">Job Notification Tracker</a>
      <nav class="top-bar__nav" aria-label="Main">
        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Toggle menu">
          <span class="nav-toggle__icon"></span>
        </button>
        <ul class="nav-links" id="nav-links">
          <li><a href="/dashboard" data-path="/dashboard">Dashboard</a></li>
          <li><a href="/saved" data-path="/saved">Saved</a></li>
          <li><a href="/digest" data-path="/digest">Digest</a></li>
          <li><a href="/settings" data-path="/settings">Settings</a></li>
          <li><a href="/proof" data-path="/proof">Proof</a></li>
        </ul>
      </nav>
    </header>

    <!-- Route content -->
    <main id="app" class="app-main">
      <section class="context-header">
        <h2 class="context-headline">Stop Missing The Right Jobs.</h2>
        <p class="context-subtext">Precision-matched job discovery delivered daily at 9AM.</p>
        <p class="landing-cta-wrap">
          <a href="/settings" class="btn btn-primary" data-path="/settings">Start Tracking</a>
        </p>
      </section>
    </main>

    <!-- Proof footer -->
    <footer class="proof-footer">
      <div class="proof-footer__inner">
        <h3 class="proof-footer__title">Proof</h3>
        <ul class="proof-checklist">
          <li>UI Built</li>
          <li>Logic Working</li>
          <li>Test Passed</li>
          <li>Deployed</li>
        </ul>
      </div>
    </footer>
  </div>

  <script src="js/data/jobs.js"></script>
  <script src="js/preferences.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/router.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/saved.js"></script>
  <script src="js/nav-toggle.js"></script>
</body>
</html>
